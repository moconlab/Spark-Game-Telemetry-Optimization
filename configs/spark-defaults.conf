# =====================================================
# Modern Game Analytics – Spark Defaults Configuration
# =====================================================

# -------------------------------
# Core Application Settings
# -------------------------------
spark.app.name                    modern-game-analytics
spark.master                      local[*]

# -------------------------------
# Serialization (Tungsten Impact)
# -------------------------------
spark.serializer                  org.apache.spark.serializer.KryoSerializer
spark.kryo.registrationRequired   false

# -------------------------------
# Memory Configuration
# -------------------------------
spark.driver.memory               2g
spark.executor.memory             4g
spark.executor.cores              2

# -------------------------------
# Shuffle Behavior (Intentionally High for Naive Jobs)
# -------------------------------
spark.sql.shuffle.partitions      200
spark.default.parallelism         200

# -------------------------------
# Adaptive Query Execution (Disabled by Default)
# Optimized jobs will override this
# -------------------------------
spark.sql.adaptive.enabled        false
spark.sql.adaptive.coalescePartitions.enabled false
spark.sql.adaptive.skewJoin.enabled false

# -------------------------------
# Broadcast Join Threshold
# (10MB default – optimized job may increase)
# -------------------------------
spark.sql.autoBroadcastJoinThreshold 10485760
spark.sql.broadcastTimeout         300

# -------------------------------
# File Input Partitioning
# -------------------------------
spark.sql.files.maxPartitionBytes 134217728
spark.sql.files.openCostInBytes    4194304

# -------------------------------
# Caching & Storage
# -------------------------------
spark.sql.inMemoryColumnarStorage.compressed true
spark.sql.inMemoryColumnarStorage.batchSize 10000

# -------------------------------
# Small Files Problem Simulation
# -------------------------------
spark.sql.sources.partitionOverwriteMode dynamic

# -------------------------------
# Event Logging (for Spark UI analysis)
# -------------------------------
spark.eventLog.enabled            true
spark.eventLog.dir                file:///tmp/spark-events
spark.history.fs.logDirectory     file:///tmp/spark-events

# -------------------------------
# Spark UI & Monitoring
# -------------------------------
spark.ui.enabled                  true
spark.sql.ui.explainMode          formatted

# -------------------------------
# Network / Timeout (for heavy shuffles)
# -------------------------------
spark.network.timeout             600s
spark.executor.heartbeatInterval  60s

# -------------------------------
# Compression
# -------------------------------
spark.sql.parquet.compression.codec snappy

# -------------------------------
# Debugging
# -------------------------------
spark.sql.execution.arrow.pyspark.enabled false
spark.sql.debug.maxToStringFields 100